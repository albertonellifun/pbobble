// ─── Grid helpers
function cols(r) {
	return r % 2 === 0 ? 10 : 9;
}

function gx(r, c) {
	return r % 2 === 0 ? R + 1 + c * R * 2 : R * 2 + 1 + c * R * 2;
}

function gy(r) {
	return GRID_TOP + r * ROW_H;
}

function nbrs(row, col) {
	const x = gx(row, col);
	const y = gy(row);
	const out = [];
	for (let r = Math.max(0, row - 1); r <= Math.min(ROWS - 1, row + 1); r++)
		for (let c = 0; c < cols(r); c++)
			if (!(r === row && c === col) && Math.hypot(gx(r, c) - x, gy(r) - y) < R * 2.25)
				out.push([r, c]);
	return out;
}

// ─── Flood fill
function flood(r0, c0, ci) {
	const vis = new Set();
	const q = [ [r0, c0] ];
	const res = [];
	while (q.length) {
		const [r, c] = q.shift();
		const k = `${r},${c}`;
		if (vis.has(k)) continue;
		vis.add(k);
		if (grid[r]?.[c] !== ci) continue;
		res.push([r, c]);
		nbrs(r, c).forEach(n => q.push(n));
	}
	return res;
}

// ─── Disconnected bubbles
function disconnected() {
	const con = new Set();
	const q = [];
	for (let c = 0; c < cols(0); c++)
		if (grid[0][c] > 0) {
			q.push([0, c]);
			con.add(`0,${c}`);
		}
	while (q.length) {
		const [r, c] = q.shift();
		nbrs(r, c).forEach(([nr, nc]) => {
			const k = `${nr},${nc}`;
			if (!con.has(k) && grid[nr]?.[nc] > 0) {
				con.add(k);
				q.push([nr, nc]);
			}
		});
	}
	const d = [];
	for (let r = 0; r < ROWS; r++)
		for (let c = 0; c < cols(r); c++)
			if (grid[r][c] > 0 && !con.has(`${r},${c}`)) d.push([r, c]);
	return d;
}

// ─── Nearest empty cell
function nearestEmpty(px, py) {
	let best = null;
	let bd2 = Infinity;
	for (let r = 0; r < ROWS; r++)
		for (let c = 0; c < cols(r); c++) {
			if (grid[r][c] > 0) continue;
			const d = Math.hypot(gx(r, c) - px, gy(r) - py);
			if (d < bd2) {
				bd2 = d;
				best = [r, c];
			}
		}
	return best;
}

function isEmpty() {
	for (let r = 0; r < ROWS; r++)
		for (let c = 0; c < cols(r); c++)
			if (grid[r][c] > 0) return false;
	return true;
}

// ─── Pick color (only colors on board)
function pickColor() {
	const p = [];
	for (let r = 0; r < ROWS; r++)
		for (let c = 0; c < cols(r); c++)
			if (grid[r][c] > 0) p.push(grid[r][c]);
	if (p.length < 3) return Math.ceil(Math.random() * BUBBLE_COLORS.length);
	return p[Math.floor(Math.random() * p.length)];
}

// ─── Place bubble
function place(px, py) {
	const cell = nearestEmpty(px, py);
	if (!cell) return;
	const [r, c] = cell;
	grid[r][c] = cur;

	const m = flood(r, c, cur);
	if (m.length >= 3) {
		m.forEach(([mr, mc]) => {
			const fx = gx(mr, mc);
			const fy = gy(mr);
			pops.push({
				x: fx,
				y: fy,
				r: R,
				maxR: R * 3.5,
				a: 1,
				ci: cur
			});
			for (let i = 0; i < 8; i++) {
				const a = i / 8 * Math.PI * 2;
				const s = 1.5 + Math.random() * 3;
				parts.push({
					x: fx,
					y: fy,
					vx: Math.cos(a) * s,
					vy: Math.sin(a) * s,
					r: 3 + Math.random() * 2,
					a: 1,
					ci: cur
				});
			}
			grid[mr][mc] = 0;
			score += 10;
		});
		disconnected().forEach(([dr, dc]) => {
			falling.push({
				x: gx(dr, dc),
				y: gy(dr),
				vx: (Math.random() - .5) * 3,
				vy: -1 - Math.random() * 2,
				ci: grid[dr][dc],
				a: 1
			});
			grid[dr][dc] = 0;
			score += 5;
		});
		sd.textContent = score;
		if (score > best) {
			best = score;
			bd.textContent = best;
			localStorage.setItem('pb3', best);
		}
		playSound('explo');
	} else {
		playSound('bubble');
	}

	if (r >= DANGER) {
		state = 'gameover';
		stopMusic();
		playSound('gameover');
		return;
	}
	if (isEmpty()) {
		state = 'win';
		stopMusic();
		playSound('win');
		return;
	}


	startNextAnimation();
	state = 'loading';
}

// ─── Color utilities
function sh(hex, a) {
	let n = parseInt(hex.slice(1), 16);
	return `rgb(${Math.max(0,Math.min(255,(n>>16)+a))},${Math.max(0,Math.min(255,((n>>8)&255)+a))},${Math.max(0,Math.min(255,(n&255)+a))})`;
}

function hr(hex) {
	const n = parseInt(hex.slice(1), 16);
	return `${n>>16},${(n>>8)&255},${n&255}`;
}

// ─── Draw Bubble
function drawBub(c, x, y, ci, rad, al) {
	al = al ?? 1;
	const col = BUBBLE_COLORS[ci - 1];
	c.save();
	c.globalAlpha = al;
	c.shadowColor = col;
	c.shadowBlur = rad * 0.66;
	const g = c.createRadialGradient(x - rad * .3, y - rad * .3, rad * .05, x, y, rad);
	g.addColorStop(0, sh(col, 110));
	g.addColorStop(.55, col);
	g.addColorStop(1, sh(col, -75));
	c.beginPath();
	c.arc(x, y, rad, 0, Math.PI * 2);
	c.fillStyle = g;
	c.fill();
	c.shadowBlur = 0;
	c.beginPath();
	c.ellipse(x - rad * .28, y - rad * .32, rad * .21, rad * .12, -.5, 0, Math.PI * 2);
	c.fillStyle = 'rgba(255,255,255,.52)';
	c.fill();
	c.beginPath();
	c.arc(x, y, rad, 0, Math.PI * 2);
	c.strokeStyle = BUBBLE_COLORS[ci - 1]+'55';//'rgba(255,255,255,.22)';
	c.lineWidth = 1.2;
	c.stroke();
	c.restore();
}

function drawCloud(c) {

    c.bezierCurveTo(390+dx, 530+dy, 430+dx, 550+dy, 420+dx, 600+dy);
    c.lineTo(-20+dx, 600+dy);
    c.closePath();

	c.shadowColor = 'rgba(200,220,255,0.6)';
	c.shadowBlur = 25;
	
	c.strokeStyle = 'rgba(255,255,255,0.6)';
	c.lineWidth = 4;

	c.fillStyle = grd;
	c.fill();
	c.stroke();

    c.shadowBlur = 0;
	
    c.fillStyle = topLight;
    c.fill();

    c.fillStyle = bottomShadow;

}

	drawGear(c, MX - 48, MY + 32, 24, 30, 10, -gr * (30 / 16), 3);//sinistra

	drawGear(c, MX + 52, MY + 6,  12, 18, 10, gr * (30 / 16) + Math.PI / 10, 3);//destra

	c.save();
	c.translate(MX, MY + 20);//pivot == centro gear

	//c.translate(0, -20);//riallineamento visivo

function drawGear(c, cx, cy, rIn, rOut, n, rot, spokes, fillCol = '#546e7a', rimCol = '#37474f', hubCol = '#b8860b') {
	c.save();
	c.translate(cx, cy);
	c.rotate(rot);
	const da = Math.PI * 2 / n;
	const tw = da * 0.38;
	c.beginPath();
	for (let i = 0; i < n; i++) {
		const a = i * da;
		c.arc(0, 0, rIn, a - da / 2 + tw * 0.12, a - tw, false);
		c.lineTo(Math.cos(a - tw * .68) * rOut, Math.sin(a - tw * .68) * rOut);
		c.arc(0, 0, rOut, a - tw * .68, a + tw * .68, false);
		c.lineTo(Math.cos(a + tw) * rIn, Math.sin(a + tw) * rIn);
	}
	c.closePath();
	const g = c.createRadialGradient(-rIn * .26, -rIn * .32, rIn * .06, 0, 0, rOut);
	g.addColorStop(0, sh(fillCol, 60));
	g.addColorStop(.5, fillCol);
	g.addColorStop(1, sh(fillCol, -60));
	c.shadowColor = 'rgba(0,0,0,.55)';
	c.shadowBlur = rIn * .35;
	c.fillStyle = g;
	c.fill();
	c.shadowBlur = 0;
	c.strokeStyle = rimCol;
	c.lineWidth = 1.6;
	c.stroke();
	// spokes
	const spk = spokes;
	c.strokeStyle = sh(fillCol, 40);
	c.lineWidth = rIn * .13;
	c.lineCap = 'round';
	for (let i = 0; i < spk; i++) {
		const sa = i / spk * Math.PI * 2;
		c.beginPath();
		c.moveTo(Math.cos(sa) * rIn * .26, Math.sin(sa) * rIn * .26);
		c.lineTo(Math.cos(sa) * rIn * .8, Math.sin(sa) * rIn * .8);
		c.stroke();
	}
	// inner ring
	c.beginPath();
	c.arc(0, 0, rIn * .58, 0, Math.PI * 2);
	c.strokeStyle = rimCol;
	c.lineWidth = 1.1;
	c.stroke();
	// hub
	c.beginPath();
	c.arc(0, 0, rIn * .27, 0, Math.PI * 2);
	const hg = c.createRadialGradient(0, 0, 1, 0, 0, rIn * .27);
	hg.addColorStop(0, sh(hubCol, 55));
	hg.addColorStop(1, hubCol);
	c.fillStyle = hg;
	c.fill();
	c.strokeStyle = rimCol;
	c.lineWidth = 1.1;
	c.stroke();
	c.beginPath();
	c.arc(0, 0, rIn * .09, 0, Math.PI * 2);
	c.fillStyle = sh(rimCol, 45);
	c.fill();
	c.restore();
}




// ─── Trajectory preview
function drawTraj(c, a, now) {
	if (!drawTrajEnabled) return;
	const pivX = DX;
	const pivY = DY - 17;
	//let tx = pivX + Math.cos(a) * 48;
	//let ty = pivY + Math.sin(a) * 48;
	let tx = MX + Math.cos(a) * (BARREL + 4);
	let ty = MY + 20 + Math.sin(a) * (BARREL + 4);
	let vx = Math.cos(a);
	let vy = Math.sin(a);
	c.save();
	
	c.lineWidth = 6;
	c.beginPath();
	c.moveTo(tx, ty);
	
	let prevX = tx;
	let	prevY = ty;
	
	const pulse = 0.5 + 0.5 * Math.sin(now / 100);//0..1, periodo 0.5s
	const maxSteps = Math.round(80 + pulse * 160);//80..240 step
	
	for (let i = 0; i < 400; i++) {
		tx += vx * 10;
		ty += vy * 10;
		if (tx - R < 0) {
			tx = R;
			vx = -vx;
		}
		if (tx + R > W) {
			tx = W - R;
			vx = -vx;
		}
		if (ty < 0) break;
		
		//const alpha = Math.max(0, 0.4 - i * 0.002);
		const alpha = Math.max(0, 0.4 - i * (0.4 / maxSteps));
		if (alpha <= 0) break;
		const aa = Math.round(alpha * 255).toString(16).padStart(2, '0');
		
		if (i % 2 === 0) {//effetto dash
			//c.strokeStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
			c.strokeStyle = BUBBLE_COLORS[cur - 1] + aa;
			c.beginPath(); 
			c.moveTo(prevX, prevY); 
			c.lineTo(tx, ty); 
			c.stroke();
		}
		
		prevX = tx; 
		prevY = ty;
		
		let hit = false;
		for (let r = 0; r < ROWS && !hit; r++)
			for (let cc = 0; cc < cols(r) && !hit; cc++)
				if (grid[r][cc] > 0 && Math.hypot(gx(r, cc) - tx, gy(r) - ty) < R * 2.1) hit = true;
		if (hit) break;
	}
	c.stroke();
	c.restore();
}

// ─── Main draw
function draw() {
	const now = Date.now();

	// BG gradient
	const bg = CX.createLinearGradient(0, 0, 0, H);
	bg.addColorStop(0, SKY_COLORS[currentSkyColor].skyDark);
	bg.addColorStop(1, SKY_COLORS[currentSkyColor].skyLight);
	CX.fillStyle = bg;
	CX.fillRect(0, 0, W, H);

	// Stars
	stars.forEach(s => {
		const t = .4 + .6 * Math.abs(Math.sin(now / 900 + s.ph));
		CX.globalAlpha = t * .75;
		CX.fillStyle = '#ffffff';
		CX.fillRect(s.x, s.y, s.r, s.r);
	});
	CX.globalAlpha = 1;

	// Grid bubbles
	for (let r = 0; r < ROWS; r++)
		for (let c = 0; c < cols(r); c++)
			if (grid[r][c] > 0) drawBub(CX, gx(r, c), gy(r), grid[r][c], R, 1);

	// Danger line
	CX.strokeStyle = 'rgba(0,0,255,.1)';
	CX.lineWidth = 3;
	CX.setLineDash([6, 6]);
	CX.beginPath();
	CX.moveTo(0, gy(DANGER));
	CX.lineTo(W, gy(DANGER));
	CX.stroke();
	CX.setLineDash([]);

	// Pop rings
	pops = pops.filter(e => e.a > .01);
	pops.forEach(e => {
		CX.beginPath();
		CX.arc(e.x, e.y, e.r, 0, Math.PI * 2);
		CX.strokeStyle = `rgba(${hr(BUBBLE_COLORS[e.ci-1])},${e.a})`;
		CX.lineWidth = 3.5;
		CX.stroke();
		e.r += (e.maxR - e.r) * .2;
		e.a *= .83;
	});

	// Particles
	parts = parts.filter(p => p.a > .01);
	parts.forEach(p => {
		CX.beginPath();
		CX.arc(p.x, p.y, p.r * p.a, 0, Math.PI * 2);
		CX.fillStyle = `rgba(${hr(BUBBLE_COLORS[p.ci-1])},${p.a})`;
		CX.fill();
		p.x += p.vx;
		p.y += p.vy;
		p.vy += .15;
		p.a *= .9;
	});

	// Falling bubbles
	falling = falling.filter(b => b.a > .01 && b.y < H + 70);
	falling.forEach(b => {
		drawBub(CX, b.x, b.y, b.ci, R, b.a);
		b.x += b.vx;
		b.y += b.vy;
		b.vy += .42;
		if (b.y > H - 90) b.a *= .92;
	});

	// Trajectory + dragon + bubble
	drawCloud(CX);//nuvoletta
	drawDragon(CX, now);//dragone
	drawGearLauncher(CX, ang, gearRot);//mechanism
	drawNext(CX);
	if (state === 'aiming') {
		drawTraj(CX, ang, now);
		const ex = MX + Math.cos(ang) * (BARREL + R / 2 - 4);
		const ey = MY + 20 + Math.sin(ang) * (BARREL + R / 2 - 4);
		drawBub(CX, ex, ey, cur, R / 2, 1);
	} else if (state === 'shooting') {
		if (ball) {
			drawBub(CX, ball.x, ball.y, ball.ci, R, 1);
		}
	}

	// ── Overlays
	if (state === 'gameover') {
		CX.fillStyle = 'rgba(5,5,20,.82)';
		CX.fillRect(0, 0, W, H);
		CX.textAlign = 'center';
		CX.shadowColor = '#e74c3c';
		CX.shadowBlur = 32;
		CX.font = 'bold 52px Impact,Arial Black,sans-serif';
		CX.fillStyle = '#e74c3c';
		CX.fillText('GAME OVER', W / 2, H / 2 - 52);
		CX.shadowBlur = 0;
		CX.font = 'bold 26px Trebuchet MS';
		CX.fillStyle = '#fff';
		CX.fillText(`POINTS: ${score}`, W / 2, H / 2 + 2);
		CX.font = '18px Trebuchet MS';
		CX.fillStyle = 'rgba(255,255,255,.52)';
		CX.fillText(`BEST: ${best}`, W / 2, H / 2 + 36);
		if (Math.sin(now / 500) > 0) {
			CX.font = 'bold 16px Trebuchet MS';
			CX.fillStyle = 'rgba(255,255,255,.8)';
			CX.fillText('— CLICK TO RESTART —', W / 2, H / 2 + 82);
		}
	}
	if (state === 'win') {
		CX.fillStyle = 'rgba(5,18,5,.82)';
		CX.fillRect(0, 0, W, H);
		CX.textAlign = 'center';
		CX.shadowColor = '#2ecc71';
		CX.shadowBlur = 32;
		CX.font = 'bold 46px Impact,Arial Black,sans-serif';
		CX.fillStyle = '#2ecc71';
		CX.fillText('YOU WIN! 🎉', W / 2, H / 2 - 52);
		CX.shadowBlur = 0;
		CX.font = 'bold 26px Trebuchet MS';
		CX.fillStyle = '#fff';
		CX.fillText(`POINTS: ${score}`, W / 2, H / 2 + 2);
		if (Math.sin(now / 500) > 0) {
			CX.font = 'bold 16px Trebuchet MS';
			CX.fillStyle = 'rgba(255,255,255,.8)';
			CX.fillText('— CLICK TO RESTART —', W / 2, H / 2 + 72);
		}
	}
	
	
	if (nextAnim) {
		const scale = 1 - nextAnim.t * 0.3;

		drawBub(
			CX,
			nextAnim.x,
			nextAnim.y,
			nextAnim.ci,
			R * scale,
			1
		);
	}
}

// ─── Update
function update() {
	if (state === 'shooting' && ball) {
		ball.x += ball.vx;
		ball.y += ball.vy;
		// wall bounces
		if (ball.x - R < 0) {
			ball.x = R;
			ball.vx = -ball.vx;
			playSound('boing');
		}
		if (ball.x + R > W) {
			ball.x = W - R;
			ball.vx = -ball.vx;
			playSound('boing');
		}
		// ceiling
		if (ball.y - R <= GRID_TOP) {
			place(ball.x, GRID_TOP + R);
			ball = null;
			return;
		}
		// hit existing bubble
		outer:
			for (let r = 0; r < ROWS; r++)
				for (let c = 0; c < cols(r); c++)
					if (grid[r][c] > 0 && Math.hypot(gx(r, c) - ball.x, gy(r) - ball.y) < R * 1.96) {
						place(ball.x, ball.y);
						ball = null;
						break outer;
					}
	}

	if (nextAnim) {
		nextAnim.t += 0.06;

		nextAnim.x += (nextAnim.tx - nextAnim.x) * 0.18;
		nextAnim.y += (nextAnim.ty - nextAnim.y) * 0.18;

		if (nextAnim.t >= 1) {
			// shift reale
			cur = nxt;
			nxt = nxt2;
			nxt2 = nxt3;
			nxt3 = nxt4;
			nxt4 = pickColor();

			nextAnim = null;
			drawNext();
			state = 'aiming';
		}
	}
}

// ─── Events
function getAng(e) {
	const rect = cv.getBoundingClientRect();
	const sx = W / rect.width;
	const ex = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
	const ey = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
	const dx = ex * sx - DX;
	const dy = ey * sx - (DY - 17);
	let a = Math.atan2(dy, dx);
	if (dy >= 0) a = dx <= 0 ? -Math.PI + .05 : -.05;
	return Math.max(-Math.PI + .05, Math.min(-.05, a));
}

function shoot() {
	if (state !== 'aiming') return;
	//const pivX = DX;
	//const pivY = DY - 17;
	const pivX = MX;
	const pivY = MY + 20;
	ball = {
		x: pivX + Math.cos(ang) * 48,
		y: pivY + Math.sin(ang) * 48,
		vx: Math.cos(ang) * SPEED,
		vy: Math.sin(ang) * SPEED,
		ci: cur
	};
	state = 'shooting';
	playSound('shoot');
}

//listeners
cv.addEventListener('mousemove', e => handlePointerMove(e.clientX, e.clientY));
cv.addEventListener('mouseleave', () => { lastMouseX = null; });
cv.addEventListener('click', e => {
	if (!isMute && !musicStarted) startMusic();
	
	if (state === 'gameover' || state === 'win') {
		reset();
		return;
	}
	if (state === 'aiming') {
		ang = getAng(e);
		shoot();
	}
});

function handlePointerMove(x, y) {
	// scala corretta rispetto al canvas
	const rect = cv.getBoundingClientRect();
	const sx = W / rect.width;
	mouseX = (x - rect.left) * sx;
	mouseY = (y - rect.top) * sx;

	if (state !== 'aiming') return;

	const mx = x - rect.left;

	ang = getAng({ clientX: x, clientY: y });

	if (lastMouseX !== null) {
		const dx = mx - lastMouseX;
		gearRot += dx * 0.01;
	}
	lastMouseX = mx;
}
//touch
cv.addEventListener('touchmove', e => {
	e.preventDefault(); //niente scroll pagina
	if (e.touches.length > 0) {
		handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
	}
}, { passive: false });

cv.addEventListener('touchend', e => {
	if (!isMute && !musicStarted) startMusic();
	
	e.preventDefault();
	if (state === 'gameover' || state === 'win') {
		reset();
		return;
	}
	if (state === 'aiming') shoot();
	
	lastMouseX = null;
}, {
	passive: false
});

window.addEventListener('keydown', e => {
	if (e.key === ' ' || e.key === 'Enter') {
		e.preventDefault();
		if (state === 'gameover' || state === 'win') reset();
		else shoot();
	}
	if (e.key === 'ArrowLeft') ang = Math.max(-Math.PI + .05, ang - .04);
	if (e.key === 'ArrowRight') ang = Math.min(-.05, ang + .04);
	if (e.key === 'R' || e.key === 'r') { reset(); }
	if (e.key === 'M' || e.key === 'm') { changeMute(); }
	if (e.key === 'D' || e.key === 'd') { DRAGON_COLORS = pickDragonColor(); }
});

function changeMute() {
	isMute = !isMute; 
	if(musicStarted) stopMusic(); 
	else if(!isMute) startMusic();
}

// ─── Responsive
function rescale() {
	const wiw = window.innerWidth;
	const wih = window.innerHeight;
	const ratio = W / H;

	const maxW = wiw - 16;
	const maxH = wih - 130;

	let newW;
	let newH;

	if (maxW / ratio > maxH) {
		newH = maxH;
		newW = newH * ratio;
	} else {
		newW = maxW;
		newH = newW / ratio;
	}

	cv.style.width = `${newW}px`;
	cv.style.height = `${newH}px`;

	document.getElementById('header').style.width = `${newW}px`;
	document.getElementById('footer').style.width = `${newW}px`;
}
rescale();
window.addEventListener('resize', rescale);

// ─── Loop
function loop() {
	update();
	draw();
	requestAnimationFrame(loop);
}
initGrid();
loop();
</script>
